# PII Pattern Set - Canonical Source
#
# This file is COMMITTED to the public dotfiles repo. It contains GENERIC
# structural patterns only - no real PII (names, emails, paths).
#
# Real-name and real-email detection happens DYNAMICALLY: the pii-scan.sh
# helper reads ~/.config/devkit/identity.json (gitignored, machine-local)
# and adds regex patterns for full_name, email_personal, email_work, and
# github_username at scan time. That way this file stays publishable.
#
# Each non-comment, non-blank line is an extended regex (ERE).
# Lines starting with `#` are comments. Blank lines are ignored.
#
# Reused across dotfiles, idea-forge, engram, team-digest pre-commit hooks
# via the shared scanner at ~/.claude/scripts/pii-scan.sh.

# === Hardcoded home paths (use $HOME or ~/ instead) ===
/Users/[A-Za-z0-9_-]+/
/home/[A-Za-z0-9_-]+/

# === Employer brand names ===
# NOTE: Open-source protocol/spec names (Hedera, HIP, HTS, HCS, Hiero) are
# NOT PII - keep them. Only the parent corporate brand is flagged here.
Hashgraph
hashgraph

# === GPG full-form fingerprints (40 hex chars) ===
# Tight enough to avoid matching SHAs of similar length in commits.
[A-Fa-f0-9]{40}

# === Common API key / token shapes ===
sk-[A-Za-z0-9]{20,}
ghp_[A-Za-z0-9]{36}
gho_[A-Za-z0-9]{36}
github_pat_[A-Za-z0-9_]{20,}
AKIA[A-Z0-9]{16}

# === Slack / Discord webhooks ===
hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/
discord\.com/api/webhooks/[0-9]+/
